<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Servidor Minecraft</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
        }
        .card {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
        }
        .status-dot {
            height: 15px;
            width: 15px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        .online { background-color: #5eff5e; box-shadow: 0 0 10px #5eff5e; }
        .offline { background-color: #ff5e5e; box-shadow: 0 0 10px #ff5e5e; }
        
        #server-status { font-weight: bold; font-size: 1.2em; }
        .info { margin-top: 20px; color: #bbb; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Mi Servidor</h2>
        <p id="server-address">cargando...</p>
        <div>
            <span id="dot" class="status-dot offline"></span>
            <span id="server-status">Consultando...</span>
        </div>
        <div class="info">
            Jugadores: <span id="player-count">0/0</span>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const IP_DEL_SERVIDOR = "scientistflprivsrv.play.hosting"; // Cambia esto por la IP de tu server
        // ---------------------

        async function checkServer() {
            const statusText = document.getElementById('server-status');
            const dot = document.getElementById('dot');
            const playerCount = document.getElementById('player-count');
            document.getElementById('server-address').innerText = IP_DEL_SERVIDOR;

            try {
                const response = await fetch(`https://api.mcsrvstat.us/2/${IP_DEL_SERVIDOR}`);
                const data = await response.json();

                if (data.online) {
                    statusText.innerText = "¡ENCENDIDO!";
                    statusText.style.color = "#5eff5e";
                    dot.className = "status-dot online";
                    playerCount.innerText = `${data.players.online} / ${data.players.max}`;
                    
                    // Opcional: Notificación de navegador
                    if (Notification.permission === "granted") {
                        new Notification("¡Servidor Online!", { body: `El servidor ${IP_DEL_SERVIDOR} ya está disponible.` });
                    }
                } else {
                    statusText.innerText = "APAGADO";
                    statusText.style.color = "#ff5e5e";
                    dot.className = "status-dot offline";
                    playerCount.innerText = "0 / 0";
                }
            } catch (error) {
                statusText.innerText = "Error de conexión";
            }
        }

        // Pedir permiso para notificaciones al cargar
        if (Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        // Revisar cada 30 segundos
        checkServer();
        setInterval(checkServer, 30000);
    </script>
</body>
</html>
